{% extends 'base.html' %}

{% block content %}
<div class="card card-modern mx-auto" style="max-width: 720px;">
    <div class="card-header bg-transparent">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
            <div>
                <h3 class="mb-1">Crear movimiento</h3>
                <p class="mb-0 text-muted">Registra un nuevo movimiento en el sistema.</p>
            </div>
            <a href="{% url 'movimientos:list' %}" class="btn btn-outline-light btn-modern-outline">Volver</a>
        </div>
    </div>
    <div class="card-body">
        <form method="POST" novalidate>
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-4">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger mt-2">
                            {{ field.errors|striptags }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end mt-4">
                <button type="reset" class="btn btn-outline-secondary btn-modern-outline">Limpiar</button>
                <button type="submit" class="btn btn-primary btn-modern">Guardar movimiento</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
