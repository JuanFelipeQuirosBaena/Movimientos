<!-- Este es el código para la barra de navegación (navbar) usando Bootstrap -->
<!-- navbar.html -->
<!-- para mas estilos https://getbootstrap.com/docs/5.3/components/navbar/-->
<nav class="navbar navbar-expand-lg navbar-modern navbar-dark py-3 shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">Agrosft</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">

        {% if user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'movimientos:list' %}">Movimientos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'logout' %}">Cerrar sesión</a>
        </li>
        {% else %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'register' %}">Registrarse</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}">Iniciar sesión</a>
        </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
